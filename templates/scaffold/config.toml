[codex]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
dangerously_bypass_approvals_and_sandbox = true
no_alt_screen = true

[council]
max_turns = 6
launch_timeout_seconds = 60
turn_timeout_seconds = 1800
require_git = true

[review]
fresh_reviewer_session_per_turn = true
reviewer_reset_mode = "clear"
allow_reviewer_test_edits = true
allow_reviewer_production_edits = false
baseline_commands = ["git diff --check"]

# reviewer_reset_mode:
# - "clear" keeps the same reviewer Codex session and sends /clear before the next turn
# - "restart" kills and recreates the reviewer session for each fresh turn

#[[review.path_rule]]
#name = "workspace_index"
#globs = ["eve_app/src/tools/core/workspace_index.py", "tests/test_workspace_indexer.py"]
#commands = ["pytest -q tests/test_workspace_indexer.py"]
